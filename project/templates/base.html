<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Crop Disease Detection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
</head>

<body>
    <div class="page-shell">
        <div class="bg-orb orb-one"></div>
        <div class="bg-orb orb-two"></div>
        <div class="bg-grid"></div>

        <nav class="navbar navbar-expand-lg app-nav">
            <div class="container">
                <a class="navbar-brand brand-lockup" href="/">
                    <span class="brand-mark">CD</span>
                    <span>
                        <strong>Crop Disease Detection</strong>
                        <small>AI-powered leaf diagnosis</small>
                    </span>
                </a>
                <div class="nav-pill">Fast visual prediction</div>
            </div>
        </nav>

        <main class="container app-container">
            <div id="content">{% block content %}{% endblock %}</div>
        </main>

        <footer class="app-footer">
            <div class="container footer-content">
                <p class="mb-0">Designed for quick plant health screening from a single leaf image.</p>
                <p class="mb-0 footer-note">Upload. Preview. Predict.</p>
            </div>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}" type="text/javascript"></script>
</body>

</html>
